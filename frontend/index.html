<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>支出分析仪表盘 · SpendingAnalyser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <div id="app">
    <div class="app-shell">
      <aside class="sidebar" aria-label="主菜单">
        <div class="brand-block">
          <div class="brand-mark">SA</div>
          <div>
            <h1>SpendingAnalyser</h1>
            <p>家庭账单分析</p>
          </div>
        </div>
        <nav class="side-nav">
          <button class="nav-item active" data-view="dashboard">仪表盘</button>
          <button class="nav-item" data-view="import">导入账单</button>
          <button class="nav-item" data-view="process">数据处理</button>
          <button class="nav-item" data-view="model">模型配置</button>
        </nav>
      </aside>

      <main class="main-shell">
        <header class="header">
          <div class="header-left">
            <h1 id="view-title">仪表盘</h1>
            <p class="subtitle" id="view-subtitle">跨用户、跨平台查看消费、资金流动和交易明细</p>
          </div>
        </header>

        <section class="app-view active" id="view-dashboard">
          <section class="filter-bar" id="filter-bar">
            <div class="filter-group">
              <label>用户</label>
              <select id="f-user">
                <option value="">全部用户</option>
              </select>
            </div>
            <div class="filter-group">
              <label>年份</label>
              <select id="f-year">
                <option value="">全部年份</option>
              </select>
            </div>
            <div class="filter-group">
              <label>平台</label>
              <div id="ms-platform" data-placeholder="全部平台"></div>
            </div>
            <div class="filter-group">
              <label>轨道</label>
              <select id="f-track">
                <option value="consumption">消费</option>
                <option value="cashflow">资金流动</option>
                <option value="">全部</option>
              </select>
            </div>
            <div class="filter-group">
              <label>一级分类</label>
              <div id="ms-category" data-placeholder="全部分类"></div>
            </div>
            <div class="filter-group">
              <label>二级分类</label>
              <div id="ms-category-l2" data-placeholder="全部二级"></div>
            </div>
            <div class="filter-group filter-date">
              <label>日期范围</label>
              <div class="date-inputs">
                <input type="date" id="f-date-from" />
                <span>至</span>
                <input type="date" id="f-date-to" />
              </div>
            </div>
            <div class="filter-group">
              <label>排除分类</label>
              <div class="exclude-tags" id="exclude-tags"></div>
              <select id="f-exclude-add">
                <option value="">点击添加排除...</option>
              </select>
            </div>
            <div class="filter-actions">
              <button class="btn-apply" id="btn-apply">应用筛选</button>
              <button class="btn-reset" id="btn-reset">重置</button>
            </div>
          </section>

          <section class="drill-bar" id="drill-bar" style="display:none">
            <span class="drill-label">当前下钻：</span>
            <div class="drill-chips" id="drill-chips"></div>
            <button class="drill-clear" id="drill-clear-all">全部退出</button>
          </section>

          <section class="cards-grid" id="summary-cards">
            <div class="card card-spend">
              <div class="card-label">净消费支出</div>
              <div class="card-value" id="total-spend">--</div>
            </div>
            <div class="card card-refund">
              <div class="card-label">退款金额</div>
              <div class="card-value" id="total-refund">--</div>
            </div>
            <div class="card card-cashflow">
              <div class="card-label">非消费转移</div>
              <div class="card-value" id="total-cashflow">--</div>
            </div>
            <div class="card card-records">
              <div class="card-label">记录总数</div>
              <div class="card-value" id="total-records">--</div>
            </div>
          </section>

          <section class="charts-row">
            <div class="chart-container">
              <h2>分类支出分布</h2>
              <canvas id="category-pie"></canvas>
            </div>
            <div class="chart-container">
              <h2>
                消费趋势
                <div class="period-toggle">
                  <button class="btn-period" data-period="year">年</button>
                  <button class="btn-period active" data-period="month">月</button>
                  <button class="btn-period" data-period="week">周</button>
                </div>
              </h2>
              <canvas id="trend-line"></canvas>
            </div>
          </section>

          <section class="charts-row">
            <div class="chart-container">
              <h2>Top 分类排行 <span style="font-size:11px;color:#6b7394">(点击筛选)</span></h2>
              <div id="top-categories-list" class="ranking-list"></div>
            </div>
            <div class="chart-container">
              <h2>Top 15 商户 <span style="font-size:11px;color:#6b7394">(点击查明细)</span></h2>
              <canvas id="merchant-bar"></canvas>
            </div>
          </section>

          <section class="chart-container full-width cashflow-panel">
            <h2>资金流动轨（非消费项）</h2>
            <div id="cashflow-content"></div>
          </section>

          <section class="table-section">
            <h2>交易明细</h2>
            <div class="table-controls">
              <input type="text" id="search-input" placeholder="搜索商户或商品..." />
              <button class="btn-search" id="btn-search">搜索</button>
            </div>
            <div class="table-wrapper">
              <table id="tx-table">
                <thead>
                  <tr></tr>
                </thead>
                <tbody id="tx-body"></tbody>
              </table>
            </div>
            <div class="pagination" id="pagination"></div>
          </section>
        </section>

        <section class="app-view" id="view-import">
          <div class="management-panel">
            <div class="panel-head">
              <div>
                <h2>导入账单</h2>
                <p>先填写这批账单属于谁，再选择平台和文件。</p>
              </div>
              <span id="upload-count">未上传文件</span>
            </div>
            <div class="upload-controls">
              <input type="text" id="upload-user" value="我" maxlength="40" placeholder="用户，例如：我 / 老婆" />
              <select id="upload-platform">
                <option value="alipay">支付宝</option>
                <option value="wechat">微信</option>
                <option value="jd">京东</option>
                <option value="meituan">美团</option>
              </select>
              <label class="file-picker">
                <input type="file" id="bill-files" multiple accept=".csv,.xlsx,.xls" />
                <span id="file-picker-label">选择文件</span>
              </label>
              <button class="btn-primary" id="btn-upload">上传</button>
            </div>
            <div class="uploaded-list" id="uploaded-list"></div>
          </div>
        </section>

        <section class="app-view" id="view-process">
          <div class="management-panel process-card">
            <div class="panel-head">
              <div>
                <h2>数据处理</h2>
                <p id="process-status">等待处理</p>
              </div>
            </div>
            <button class="btn-run" id="btn-process">一键分析</button>
          </div>
        </section>

        <section class="app-view" id="view-model">
          <div class="management-panel model-card">
            <div class="panel-head">
              <div>
                <h2>模型配置</h2>
                <p id="model-status">未配置</p>
              </div>
            </div>
            <div class="model-grid">
              <input type="password" id="llm-api-key" placeholder="API Key" autocomplete="off" />
              <input type="text" id="llm-base-url" placeholder="Base URL" />
              <input type="text" id="llm-model" placeholder="模型名称" />
              <button class="btn-secondary" id="btn-save-config">保存配置</button>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
